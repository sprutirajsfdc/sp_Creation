<template>
    <lightning-card title="Invoice Status Path">
        <div class="slds-path">
            <ul class="slds-path__nav" role="listbox">
                <template for:each={stages} for:item="stage">
                    <li key={stage.value}
                        class={stage.class}
                        data-value={stage.value}
                        onclick={handleStageClick}>
                        <a role="option">
                            <span class="slds-path__title">
                                {stage.label} {stage.emoji}
                            </span>
                        </a>
                    </li>
                </template>
            </ul>

            <!-- Modal for Paid -->
            <template if:true={isModalOpen}>
                <section role="dialog" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">

                        <header class="slds-modal__header">
                            <h2 class="slds-text-heading_medium">Enter Payment Date</h2>
                        </header>

                        <div class="slds-modal__content slds-p-around_medium">
                            <lightning-input
                                type="date"
                                label="Payment Date"
                                value={paymentDate}
                                onchange={handleDateChange}>
                            </lightning-input>
                        </div>

                        <footer class="slds-modal__footer">
                            <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                            <lightning-button variant="brand" label="Save" onclick={handleSavePayment}></lightning-button>
                        </footer>

                    </div>
                </section>

                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>
        </div>
    </lightning-card>
</template>
